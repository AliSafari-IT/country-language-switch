name: Publish Package to npm

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @asafarim/country-language-selector typecheck

      - name: Test
        run: pnpm --filter @asafarim/country-language-selector test

      - name: Build package
        run: pnpm --filter @asafarim/country-language-selector build

      - name: Check if version changed
        id: version-check
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/country-language-selector/package.json').version")
          PUBLISHED_VERSION=$(npm view @asafarim/country-language-selector version 2>/dev/null || echo "none")

          echo "Package version: $PACKAGE_VERSION"
          echo "Published version: $PUBLISHED_VERSION"

          if [ "$PACKAGE_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "Version unchanged, skipping publish"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "Version changed, will publish"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

      # actions/setup-node writes a userconfig .npmrc containing the literal
      # placeholder `_authToken=${NODE_AUTH_TOKEN}`. Relying on that expansion
      # is brittle with pnpm and silently produces anonymous requests, which
      # npm answers with a misleading E404 on scoped packages. Instead we write
      # the resolved token directly to the .npmrc pnpm will actually read.
      - name: Configure npm authentication
        if: steps.version-check.outputs.should_publish == 'true'
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is empty or unset. Add a valid npm automation token (with publish access to the @asafarim scope) as the NPM_TOKEN repository secret."
            exit 1
          fi
          NPMRC_PATH="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          echo "registry=https://registry.npmjs.org/" >> "${NPMRC_PATH}"
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> "${NPMRC_PATH}"
          echo "always-auth=true" >> "${NPMRC_PATH}"
          echo "Wrote npm auth to ${NPMRC_PATH}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm authentication
        if: steps.version-check.outputs.should_publish == 'true'
        run: npm whoami

      - name: Publish to npm
        if: steps.version-check.outputs.should_publish == 'true'
        run: pnpm --filter @asafarim/country-language-selector publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
